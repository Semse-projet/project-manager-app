version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/project-manager-app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    # Solo etiquetas que EXISTEN en el repo: una etiqueta inexistente hace que
    # Dependabot comente "The following labels could not be found" en cada PR.
    labels:
      - "dependencies"
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@angular-eslint/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Majors requieren migración planificada, no bump automático
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      actions:
        patterns:
          - "*"
