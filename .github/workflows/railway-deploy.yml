name: Railway Deploy

# serviceInstanceDeploy(latestCommit: true, commitSha: SHA) triggers a REAL
# fresh build from source — unlike serviceInstanceDeployV2 which redeploys
# the same cached image. Always use this form when pushing code changes.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy
  cancel-in-progress: false

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy exact commit to Railway (fresh build)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENV_ID: d682210a-956a-4508-9c5b-4ca5959278f9
        run: |
          set -euo pipefail
          # semse-worker, semse-API, semse-web, semse-vision (proyecto SEMSEproject)
          for svc in \
            26cd1c52-1a07-4f05-8b21-9a225e601d7a \
            2bd1bd3f-9aa1-4fc3-a714-4cf90c52c770 \
            40ab1cd0-b0a6-4760-a43f-8742c1962ef7 \
            63a901e8-189e-4748-97f7-b7e60e628ee2; do
            response=$(curl -sf -X POST https://backboard.railway.com/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"$svc\\\", environmentId: \\\"$ENV_ID\\\", latestCommit: true, commitSha: \\\"$GITHUB_SHA\\\") }\"}")
            echo "$response" | grep -q '"serviceInstanceDeploy"' \
              || { echo "Deploy failed for service $svc: $response"; exit 1; }
            echo "Fresh build de $GITHUB_SHA disparado para servicio $svc"
          done

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to be live
        run: sleep 120

      - name: Verify semse-API health
        run: |
          curl -sf https://project-manager-app-production-977f.up.railway.app/v1/health \
            | grep -q '"status":"ok"' \
            && echo "semse-API healthy ✅" \
            || { echo "semse-API health check failed ❌"; exit 1; }

      - name: Verify semse-web
        run: |
          code=$(curl -so /dev/null -w "%{http_code}" \
            https://semse-web-production.up.railway.app/)
          [ "$code" = "200" ] \
            && echo "semse-web healthy ✅ (HTTP $code)" \
            || { echo "semse-web returned $code ❌"; exit 1; }
