name: Railway Deploy

# La GitHub App de Railway no esta instalada en la org Semse-projet, por lo
# que Railway no recibe eventos de push. Este workflow despliega el commit
# exacto del push via serviceInstanceDeployV2 (la lectura de HEAD por parte
# de Railway tiene lag, asi que se pasa el SHA explicito). Si algun dia se
# instala la app nativa de Railway, este workflow puede eliminarse.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy exact commit to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENV_ID: d682210a-956a-4508-9c5b-4ca5959278f9
        run: |
          set -euo pipefail
          # semse-worker, semse-API, semse-web (proyecto SEMSEproject)
          for svc in \
            26cd1c52-1a07-4f05-8b21-9a225e601d7a \
            2bd1bd3f-9aa1-4fc3-a714-4cf90c52c770 \
            40ab1cd0-b0a6-4760-a43f-8742c1962ef7; do
            response=$(curl -sf -X POST https://backboard.railway.com/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"mutation { serviceInstanceDeployV2(serviceId: \\\"$svc\\\", environmentId: \\\"$ENV_ID\\\", commitSha: \\\"$GITHUB_SHA\\\") }\"}")
            echo "$response" | grep -q '"serviceInstanceDeployV2"' \
              || { echo "Deploy failed for service $svc: $response"; exit 1; }
            echo "Deploy de $GITHUB_SHA disparado para servicio $svc"
          done
