name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: project-manager-app

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: semse
          POSTGRES_PASSWORD: semse
          POSTGRES_DB: semse
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U semse -d semse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://semse:semse@127.0.0.1:5433/semse?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: project-manager-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run full test suite
        run: pnpm test:ci

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
