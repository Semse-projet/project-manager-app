name: Bug report
description: Reporta un problema en la app
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Gracias por reportar. Completa la información para poder reproducirlo."
  - type: input
    id: summary
    attributes:
      label: Resumen
      placeholder: Descripción corta del error
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a...
        2. Hacer click en...
        3. Ver error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Entorno
      placeholder: Navegador, OS, versión
