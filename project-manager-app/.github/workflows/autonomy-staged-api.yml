name: Autonomy Staged API

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "packages/autonomy/**"
      - "packages/schemas/**"
      - "packages/shared/**"
      - "packages/db/**"
      - "scripts/api-autonomy-staged-smoke.mjs"
      - ".github/workflows/autonomy-staged-api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/autonomy/**"
      - "packages/schemas/**"
      - "packages/shared/**"
      - "packages/db/**"
      - "scripts/api-autonomy-staged-smoke.mjs"
      - ".github/workflows/autonomy-staged-api.yml"

concurrency:
  group: autonomy-staged-api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  autonomy-staged-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: semse
          POSTGRES_PASSWORD: semse
          POSTGRES_DB: semse
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U semse -d semse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://semse:semse@127.0.0.1:5433/semse?schema=public
      AUTH_SECRET: semse_local_secret_123456789012345
      REDIS_URL: redis://127.0.0.1:6379
      SEMSE_AUTONOMY_LOCAL_PR_MODE: "true"
      SEMSE_API_URL: http://127.0.0.1:4112
      SEMSE_TENANT_ID: tnt_demo
      SEMSE_ORG_ID: org_ops
      SEMSE_USER_ID: usr_ops_admin
      SEMSE_ROLES: OPS_ADMIN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Build API runtime
        run: npm run build:api

      - name: Start API runtime
        run: |
          HOST=127.0.0.1 PORT=4112 node apps/api/dist/main.js > /tmp/semse-autonomy-staged-api.log 2>&1 &
          echo $! > /tmp/semse-autonomy-staged-api.pid

      - name: Wait for healthcheck
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:4112/v1/health >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 1
          done
          echo "API did not start in time"
          tail -n 200 /tmp/semse-autonomy-staged-api.log || true
          exit 1

      - name: Run staged autonomy smoke
        run: npm run smoke:autonomy:staged

      - name: Stop API runtime
        if: always()
        run: |
          if [ -f /tmp/semse-autonomy-staged-api.pid ]; then
            kill "$(cat /tmp/semse-autonomy-staged-api.pid)" || true
          fi

      - name: Upload autonomy staged API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomy-staged-api-log
          path: /tmp/semse-autonomy-staged-api.log
          if-no-files-found: ignore
