name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (monorepo root — auth, shared, logic)
        run: npm run test:unit

      - name: Verify workspace
        run: npm run verify:workspace

  unit-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Coverage summary (PR/Run)
        if: always()
        run: |
          node --input-type=module -e "import fs from 'node:fs'; const p='coverage/coverage-summary.json'; if (!fs.existsSync(p)) process.exit(0); const t=JSON.parse(fs.readFileSync(p,'utf8')).total; const lines=[`Coverage Summary`,`- Lines: ${t.lines.pct}%`,`- Branches: ${t.branches.pct}%`,`- Functions: ${t.functions.pct}%`,`- Statements: ${t.statements.pct}%`].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines + '\n');"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          if-no-files-found: ignore

  e2e:
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
