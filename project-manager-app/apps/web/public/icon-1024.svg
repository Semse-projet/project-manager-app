<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle inner shine overlay -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#shine)"/>

  <!-- Decorative ring (outer) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="56"/>

  <!-- Decorative ring (inner) -->
  <circle cx="512" cy="512" r="260" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="32"/>

  <!-- S lettermark -->
  <!--
    The "S" is drawn as a path: bold, geometric, centered.
    Based on a 600×600 bounding box centered at 512,512 → starts at 212,212.
  -->
  <text
    x="512"
    y="680"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="620"
    font-weight="900"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-20"
  >S</text>

  <!-- Bottom label strip -->
  <rect x="0" y="856" width="1024" height="168" rx="0" fill="#000000" fill-opacity="0.18" clip-path="url(#round)"/>
  <text
    x="512"
    y="968"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="88"
    font-weight="800"
    text-anchor="middle"
    fill="#ffffff"
    fill-opacity="0.92"
    letter-spacing="8"
  >SEMSE</text>
</svg>
